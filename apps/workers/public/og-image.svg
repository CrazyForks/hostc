<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 极光橙渐变 (Cloudflare Edge) -->
    <linearGradient id="edgeArrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#e52e71"/>
    </linearGradient>
    
    <!-- 网格背景 (Grid) -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    
    <!-- 居中光晕 (Glow) -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a18" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底板 -->
  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- 光晕效果 -->
  <circle cx="600" cy="315" r="500" fill="url(#glow)"/>

  <!-- Logo (基于 favicon.svg 放大复用) -->
  <g transform="translate(500, 110) scale(2)">
    <line x1="28" y1="20" x2="28" y2="80" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <g stroke="url(#edgeArrowGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
       <path d="M 28 60 C 28 36, 45 36, 60 36 L 76 36" />
       <path d="M 60 20 L 76 36 L 60 52" />
    </g>
  </g>

  <!-- 标题文字 -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-3">
    hostc
  </text>
  
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#e4e4e7" text-anchor="middle" letter-spacing="-1">
    Localhost to the edge.
  </text>
  
  <text x="600" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa" text-anchor="middle">
    Instantly expose your local services, powered by Cloudflare Workers
  </text>
</svg>
